<style>*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:40px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{text-align:center;color:#333;font-size:24px;margin-bottom:8px}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.search-box{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.search-box input{width:100%;padding:16px;border:2px solid #e0e0e0;border-radius:12px;font-size:24px;letter-spacing:12px;text-align:center;outline:none;transition:border-color 0.2s;box-sizing:border-box}
.search-box input:focus{border-color:#667eea}
.search-box input::placeholder{letter-spacing:0;color:#bbb}
.search-box button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:17px;font-weight:600;cursor:pointer;transition:transform 0.1s,opacity 0.2s}
.search-box button:hover{opacity:0.9}
.search-box button:active{transform:scale(0.96)}
.result-card{background:#f8f9ff;border-radius:12px;padding:20px;min-height:60px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;border:1px solid #e8e8ff}
.result-card.has-result{border-color:#667eea;background:#f0f2ff}
.result-card .result-placeholder{color:#ccc;font-size:14px}
.result-card .result-content{text-align:center}
.result-card .result-code{font-size:14px;color:#888;margin-bottom:4px}
.result-card .result-name{font-size:20px;font-weight:700;color:#333}
.result-card .result-old{display:inline-block;font-size:12px;color:#fff;background:#faad14;border-radius:4px;padding:1px 6px;margin-right:6px;vertical-align:middle;font-weight:400}
.result-card .result-error{color:#e74c3c;font-size:15px}
.result-pinyin{font-size:13px;color:#999;margin-top:4px;letter-spacing:1px}
.history-list .h-pinyin{font-size:11px;color:#aaa;margin-top:2px;display:block}
.history-section h2{font-size:16px;color:#555;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.history-section h2 .clear-btn{font-size:13px;color:#999;cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:6px}
.history-section h2 .clear-btn:hover{background:#f0f0f0;color:#e74c3c}
.history-list{list-style:none}
.history-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;background:#f8f8f8;margin-bottom:6px;font-size:14px;cursor:pointer;transition:background 0.15s}
.history-list li:hover{background:#f0f0f0}
.history-list .h-code{font-weight:600;color:#667eea;font-family:monospace;font-size:15px}
.history-list .h-name{color:#555;flex:1;margin:0 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-list .h-old{display:inline-block;font-size:10px;color:#faad14;border:1px solid #faad14;border-radius:3px;padding:0 3px;margin-right:3px;vertical-align:middle}
.history-list .h-time{color:#bbb;font-size:12px;white-space:nowrap}
.history-empty{text-align:center;color:#ccc;font-size:14px;padding:20px 0}
@media (max-width:480px){
body{padding:12px}
.container{padding:24px 16px;border-radius:16px}
h1{font-size:20px}
.search-box input{font-size:22px;padding:14px}
.result-card .result-name{font-size:18px}
}
</style>
</head>

</div>

function toPinyin(text) {
  var result = [];
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (PY[c]) {
      result.push(PY[c]);
    } else {
      result.push(c);
    }
  }
  return result.join(' ');
}

function E(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function R(){
  if(!h.length){l.innerHTML='<li class="history-empty">暂无查询记录</li>';return;}
  var s='';
  for(var j=0;j<h.length;j++){
    var a=h[j], d=new Date(a.t);
    var ts=(d.getMonth()+1)+'/'+d.getDate()+' '+(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
    s+='<li onclick="Q(\''+a.c+'\')"><span class="h-code">'+a.c+'</span><span class="h-name">'+(a.o?'<span class="h-old">旧</span>':'')+E(a.n)+'<br><span class="h-pinyin">'+toPinyin(a.n)+'</span></span><span class="h-time">'+ts+'</span></li>';
  }
  l.innerHTML=s;
}

function A(c,n,o){
  for(var j=0;j<h.length;j++){if(h[j].c===c){h.splice(j,1);break;}}
  h.unshift({c:c,n:n,t:Date.now(),o:o});
  if(h.length>5)h.length=5;
  R();
}

function S(html){c.innerHTML=html;c.className='result-card has-result';}

function Q(code){i.value=code;D();}

function D(){
  var code=i.value.trim();
  if(code.length!==4||!/^\d{4}$/.test(code)){S('<span class="result-error">请输入4位数字代码</span>');return;}
  var r=G(code);
  if(!r){S('<span class="result-error">未找到该代码对应的地区</span>');A(code,'未知地区',false);return;}
  A(code,r.n,r.o);
  var x='<div class="result-content"><div class="result-code">'+code+'</div><div class="result-name">';
  if(r.o)x+='<span class="result-old">旧</span>';
  x+=E(r.n)+'</div>';
  x+='<div class="result-pinyin">'+toPinyin(r.n)+'</div>';
  x+='</div>';S(x);i.select();
}
