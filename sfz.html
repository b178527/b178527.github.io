<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(255,255,255,0.95);backdrop-filter:blur(10px);border-radius:20px;padding:40px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{text-align:center;color:#333;font-size:24px;margin-bottom:8px}
.subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:24px}
.search-box{display:flex;gap:10px;margin-bottom:16px}
.search-box input{flex:1;padding:12px 16px;border:2px solid #e0e0e0;border-radius:12px;font-size:16px;outline:none;transition:border-color 0.2s;letter-spacing:2px}
.search-box input:focus{border-color:#667eea}
.search-box input::placeholder{letter-spacing:0;color:#bbb}
.search-box button{padding:12px 24px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:transform 0.1s,opacity 0.2s;white-space:nowrap}
.search-box button:hover{opacity:0.9}
.search-box button:active{transform:scale(0.96)}
.result-card{background:#f8f9ff;border-radius:12px;padding:20px;min-height:60px;display:flex;align-items:center;justify-content:center;margin-bottom:24px;border:1px solid #e8e8ff}
.result-card.has-result{border-color:#667eea;background:#f0f2ff}
.result-card .result-placeholder{color:#ccc;font-size:14px}
.result-card .result-content{text-align:center}
.result-card .result-code{font-size:14px;color:#888;margin-bottom:4px}
.result-card .result-name{font-size:20px;font-weight:700;color:#333}
.result-card .result-error{color:#e74c3c;font-size:15px}
.history-section h2{font-size:16px;color:#555;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.history-section h2 .clear-btn{font-size:13px;color:#999;cursor:pointer;background:none;border:none;padding:4px 8px;border-radius:6px}
.history-section h2 .clear-btn:hover{background:#f0f0f0;color:#e74c3c}
.history-list{list-style:none}
.history-list li{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:8px;background:#f8f8f8;margin-bottom:6px;font-size:14px}
.history-list li:hover{background:#f0f0f0}
.history-list .h-code{font-weight:600;color:#667eea;font-family:monospace;font-size:15px}
.history-list .h-name{color:#555;flex:1;margin:0 10px}
.history-list .h-time{color:#bbb;font-size:12px;white-space:nowrap}
.history-empty{text-align:center;color:#ccc;font-size:14px;padding:20px 0}

@media(max-width:480px){
.container{padding:24px 16px;border-radius:16px}
h1{font-size:20px}
.search-box{flex-direction:column;gap:8px}
.search-box input{padding:14px 16px;font-size:18px;letter-spacing:4px;text-align:center}
.search-box button{padding:14px;font-size:16px}
.result-card{padding:16px;min-height:50px}
.result-card .result-name{font-size:17px}
.history-list li{padding:8px 10px;font-size:13px}
}
@media(max-width:360px){
.container{padding:16px 12px}
h1{font-size:18px}
.subtitle{font-size:12px}
.result-card .result-name{font-size:15px}
}
</style>
</head>

<h1>🔍 身份证地区查询</h1>

<div class="search-box">
<input type="text" id="codeInput" maxlength="4" placeholder="请输入4位地区代码" inputmode="numeric" pattern="[0-9]*">
<button id="searchBtn">查询</button>
</div>
<div class="result-card" id="resultCard">

</div>

<h2>📋 历史查询<button class="clear-btn" id="clearBtn">清空</button></h2>
<ul class="history-list" id="historyList">

</ul>
</div>
